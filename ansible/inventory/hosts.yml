# ──────────────────────────────────────────────
# Inventario de hosts — Fastory
# ──────────────────────────────────────────────
# Este inventario se actualiza con las IPs reales
# después de ejecutar terraform apply.
# Ejecutar: terraform output para obtener las IPs.
# ──────────────────────────────────────────────

all:
  vars:
    ansible_user: ec2-user
    ansible_ssh_private_key_file: ~/.ssh/fastory-key.pem

  children:
    app_servers:
      hosts:
        app_server_1:
          ansible_host: PENDIENTE_TERRAFORM_OUTPUT
